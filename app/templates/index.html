<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Vision | AI Live Analytics</title>
    <meta name="description" content="Real-time crowd analytics dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030712;
            --bg-panel: rgba(17, 24, 39, 0.65);
            --bg-panel-hover: rgba(31, 41, 55, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --accent: #0ea5e9;
            --accent-glow: #38bdf8;
            --accent-secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.08), transparent 40%),
                        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08), transparent 30%);
            z-index: -1;
            animation: pulse-bg 15s ease-in-out infinite alternate;
        }

        @keyframes pulse-bg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Top Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(3, 7, 18, 0.5);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
        }

        .brand-text h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            color: transparent;
        }
        
        .brand-text p {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Connection Badge */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            transition: all 0.3s ease;
        }
        .status-badge.disconnected {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Color Filter Dropdown */
        .filter-select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .filter-select:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        }
        .filter-select option {
            background: var(--bg-base);
            color: var(--text-main);
        }

        /* Main Layout */
        .dashboard-container {
            display: flex;
            flex-direction: column;
            padding: 30px 40px;
            gap: 30px;
            flex: 1;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--card-color), transparent);
            opacity: 0.7;
        }

        .stat-icon {
            font-size: 24px;
            width: 48px; height: 48px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-info { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 13px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; color: #fff; line-height: 1; }
        .stat-val.highlight { color: var(--card-color); text-shadow: 0 0 20px rgba(var(--card-color-rgb), 0.4); }

        /* Video Section */
        .video-section {
            display: flex;
            gap: 30px;
            align-items: stretch;
            height: calc(100vh - 350px);
            min-height: 500px;
        }

        /* Stream Switcher Sidebar */
        .stream-switcher {
            width: 280px;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .switcher-title {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 10px;
        }

        .stream-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            padding: 16px 20px;
            border-radius: 16px;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stream-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .stream-btn.active {
            background: rgba(14, 165, 233, 0.1);
            border-color: rgba(14, 165, 233, 0.3);
            color: var(--text-main);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.1);
        }

        .stream-btn .status {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stream-btn.active .status { opacity: 1; }

        /* Video Display Area */
        .video-display {
            flex: 1;
            background: #000;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden; /* Important for zooming */
        }

        #main-video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Default for grid view */
            transition: all 0.6s cubic-bezier(0.65, 0, 0.35, 1); /* Smooth zoom transition */
            transform-origin: center center;
            display: block;
        }

        /* Native Backend View Routing (CSS zooming removed for high quality) */

        /* Video Overlays */
        .video-overlay-header {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .cam-title-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .timestamp-badge {
            background: rgba(14, 165, 233, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(14, 165, 233, 0.3);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-glow);
            font-family: 'JetBrains Mono', monospace;
        }

        .hud-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            z-index: 5;
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand">
            <div class="brand-logo">👁️</div>
            <div class="brand-text">
                <h1>Nexus Vision</h1>
                <p>AI Surveillance & Analytics</p>
            </div>
        </div>
        <div class="nav-controls">
            <select class="filter-select" id="color-filter">
                <option value="all">🎯 Tracking Focus: All</option>
                <option value="red">🔴 Focus: Red</option>
                <option value="blue">🔵 Focus: Blue</option>
                <option value="green">🟢 Focus: Green</option>
                <option value="black">⚫ Focus: Black</option>
                <option value="white">⚪ Focus: White</option>
            </select>
            <div class="status-badge" id="ws-status">
                <div class="dot"></div>
                <span id="ws-text">Connected</span>
            </div>
        </div>
    </nav>

    <!-- Main Dashboard -->
    <main class="dashboard-container">
        
        <!-- Stats Row -->
        <div class="stats-row" id="stats-container">
            <div class="stat-card" style="--card-color: #f87171; --card-color-rgb: 248, 113, 113;" id="total-stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <span class="stat-label">Total / Targets</span>
                    <span class="stat-val highlight" id="val-total">0 / 0</span>
                </div>
            </div>
        </div>

        <!-- Video & Controls -->
        <div class="video-section">
            
            <!-- Stream Switcher -->
            <aside class="stream-switcher" id="stream-switcher">
                <div class="switcher-title">Camera Feeds</div>
                <button class="stream-btn active" data-view="grid" onclick="switchView('grid', 'MULTI-CAM GRID', this)">
                    <span>Grid View (All)</span>
                    <div class="status"></div>
                </button>
            </aside>

            <!-- Video Display -->
            <div class="video-display">
                <div class="video-overlay-header">
                    <div class="cam-title-badge" id="current-view-title">
                        <div class="dot" style="background:#ef4444; box-shadow:0 0 8px #ef4444;"></div>
                        MULTI-CAM GRID
                    </div>
                    <div class="timestamp-badge" id="clock">00:00:00</div>
                </div>
                
                <div class="video-container view-grid" id="video-container">
                    <img id="main-video" src="" alt="Connecting to feed...">
                </div>

                <div class="hud-overlay"></div>
            </div>

        </div>
    </main>

    <script>
        // --- WebSockets ---
        const wsStatus = document.getElementById('ws-status');
        const wsText = document.getElementById('ws-text');
        let telemetryWs = null;
        
        function updateConnStatus(status) {
            wsStatus.className = 'status-badge ' + status;
            wsText.innerText = status === 'connected' ? 'Live Connected' : 'Reconnecting...';
        }

        function connectTelemetry() {
            updateConnStatus('connecting');
            telemetryWs = new WebSocket(`ws://${location.host}/ws/telemetry`);
            
            telemetryWs.onopen = () => updateConnStatus('connected');
            telemetryWs.onclose = () => { updateConnStatus('disconnected'); setTimeout(connectTelemetry, 3000); };
            
            telemetryWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.telemetry) {
                    const t = data.telemetry;
                    
                    if (t.cam_stats && window.cameraList && window.cameraList.length > 0) {
                        window.cameraList.forEach(cam => {
                            const el = document.getElementById(`val-cam${cam.id}`);
                            if (el) {
                                const stats = t.cam_stats[String(cam.id)] || t.cam_stats[`cam${cam.id}`] || { occupancy: 0, targets: 0 };
                                el.innerText = `${stats.occupancy} / ${stats.targets}`;
                            }
                        });
                    }
                    
                    document.getElementById('val-total').innerText = `${t.total_occupancy ?? 0} / ${t.target_color_count ?? 0}`;
                }
            };

            document.getElementById('color-filter').addEventListener('change', (e) => {
                const val = e.target.value;
                document.getElementById('label-targets').innerText = val === 'all' ? 'Target Matches' : `${val.toUpperCase()} Targets`;
                if(telemetryWs && telemetryWs.readyState === WebSocket.OPEN) {
                    telemetryWs.send(JSON.stringify({ target_color: val }));
                }
            });
        }
        
        connectTelemetry();

        // Video Feed
        const videoEl = document.getElementById('main-video');
        const wsVideo = new WebSocket(`ws://${location.host}/ws/video`);
        wsVideo.binaryType = 'blob';
        wsVideo.onmessage = (e) => {
            const url = URL.createObjectURL(e.data);
            videoEl.src = url;
            videoEl.onload = () => URL.revokeObjectURL(url);
        };

        // --- Stream Switching Logic ---
        const videoContainer = document.getElementById('video-container');
        const titleBadge = document.getElementById('current-view-title');
        window.cameraList = [];

        function switchView(view, title, btnElement) {
            document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
            } else {
                document.querySelector('[data-view="grid"]').classList.add('active');
            }
            
            if (telemetryWs && telemetryWs.readyState === WebSocket.OPEN) {
                telemetryWs.send(JSON.stringify({ view_mode: view }));
            }
            
            titleBadge.innerHTML = `<div class="dot" style="background:#ef4444; box-shadow:0 0 8px #ef4444;"></div>${title}`;
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                window.cameraList = config.cameras || [];
                
                const switcher = document.getElementById('stream-switcher');
                const statsContainer = document.getElementById('stats-container');
                const totalCard = document.getElementById('total-stat-card');
                
                const colors = [
                    { hex: '#38bdf8', rgb: '56, 189, 248' },
                    { hex: '#818cf8', rgb: '129, 140, 248' },
                    { hex: '#34d399', rgb: '52, 211, 153' },
                    { hex: '#fbbf24', rgb: '251, 191, 36' },
                    { hex: '#f472b6', rgb: '244, 114, 182' },
                    { hex: '#a78bfa', rgb: '167, 139, 250' }
                ];
                
                window.cameraList.forEach((cam, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'stream-btn';
                    btn.dataset.view = `cam${cam.id}`;
                    btn.innerHTML = `<span>CAM ${cam.id}: ${cam.name || 'Camera'}</span><div class="status"></div>`;
                    btn.onclick = () => switchView(`cam${cam.id}`, `CAM ${cam.id}: ${(cam.name || 'CAMERA').toUpperCase()}`, btn);
                    switcher.appendChild(btn);
                    
                    const color = colors[idx % colors.length];
                    const card = document.createElement('div');
                    card.className = 'stat-card';
                    card.style.setProperty('--card-color', color.hex);
                    card.style.setProperty('--card-color-rgb', color.rgb);
                    card.innerHTML = `
                        <div class="stat-icon">📷</div>
                        <div class="stat-info">
                            <span class="stat-label">Cam ${cam.id} (${cam.name || 'Stats'})</span>
                            <span class="stat-val highlight" id="val-cam${cam.id}">0 / 0</span>
                        </div>
                    `;
                    statsContainer.insertBefore(card, totalCard);
                });
                
            } catch (err) {
                console.error('Failed to load config', err);
            }
        }
        
        loadConfig();

        // --- Clock ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', {hour12: false});
        }, 1000);

    </script>
</body>
</html>
